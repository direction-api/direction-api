# ============================================================
# Direction API — Docker Compose de Produção (Hardcoded)
# Senha Padrão: zennitex2026
# ============================================================

services:
  # 🚀 Direction API — Aplicação Principal
  direction-api:
    image: ghcr.io/direction-api/direction-api:latest
    container_name: direction-api
    restart: always
    ports:
      - "3000:3000"
    environment:
      - GLOBAL_API_KEY=admin
      - POSTGRES_URI=postgres://postgres:admin@direction-postgres:5432/direction_db
      - RABBITMQ_URI=amqp://admin:admin@direction-rabbitmq:5672
      - REDIS_URI=redis://direction-redis:6379
      - WEBHOOK_URL=https://seu-webhook.com/instagram
    depends_on:
      direction-postgres:
        condition: service_healthy
      direction-rabbitmq:
        condition: service_healthy
      direction-redis:
        condition: service_healthy
    volumes:
      - ./browser_data:/app/browser_data
    networks:
      - direction-network

  # 🐘 PostgreSQL — Banco de Dados com Auto-Init
  direction-postgres:
    image: postgres:15-alpine
    container_name: direction-postgres
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=admin
      - POSTGRES_DB=direction_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # O arquivo init.sql deve estar na mesma pasta para criar as tabelas
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - direction-network

  # 🐇 RabbitMQ — Fila de Mensagens
  direction-rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: direction-rabbitmq
    restart: always
    ports:
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=admin
      - RABBITMQ_DEFAULT_PASS=admin
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - direction-network

  # 🟥 Redis — Cache de Sessões
  direction-redis:
    image: redis:7-alpine
    container_name: direction-redis
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - direction-network

networks:
  direction-network:
    driver: bridge

volumes:
  postgres_data:
  rabbitmq_data:
  redis_data:
